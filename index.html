<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Check-In - POWERED BY DAVE-CO</title>
    <style>
        /* --- BRANDING & BASICS --- */
        :root {
            --brand-primary: #8b55d6;
            --brand-secondary: #5e309c;
            --glass-bg: rgba(20, 20, 20, 0.85);
            --text-color: #ffffff;
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: linear-gradient(135deg, #120e2b 0%, #0b0b0b 100%);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            color: var(--text-color);
        }

        /* --- THE CARD (Glassmorphism) --- */
        .container { 
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            width: 100%; 
            max-width: 400px; 
            padding: 50px 40px; 
            border-radius: 20px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        h1 { margin: 0 0 10px 0; font-size: 32px; letter-spacing: 1px; font-weight: 700; text-transform: uppercase;}
        p.subtitle { margin: 0 0 40px 0; color: #aaa; font-size: 14px; text-transform: uppercase;}

        /* --- INPUT FIELDS --- */
        .input-group { position: relative; margin-bottom: 25px; text-align: left; }
        label { display: block; margin-bottom: 8px; color: #ddd; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        input { 
            width: 100%; padding: 15px; background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; 
            box-sizing: border-box; font-size: 16px; color: white; transition: all 0.3s ease;
        }
        input:focus { outline: none; border-color: var(--brand-primary); background: rgba(255,255,255,0.1); box-shadow: 0 0 15px rgba(139, 85, 214, 0.3); }

        /* --- THE BUTTON --- */
        button { 
            width: 100%; padding: 18px; margin-top: 10px;
            background: linear-gradient(90deg, var(--brand-secondary), var(--brand-primary)); 
            color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; 
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(139, 85, 214, 0.4); }
        button:disabled { background: #444; cursor: not-allowed; transform: none; }

        /* --- UI STATES --- */
        .success-message { display: none; color: #fff; animation: fadeIn 0.5s ease; }
        .success-icon { font-size: 50px; color: #28a745; margin-bottom: 20px; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    
    <div id="formSection">
        <h1>WELCOME</h1>
        <p class="subtitle">PLEASE REGISTER BELOW</p>

        <form id="leadForm">
            <div class="input-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Name" required autocomplete="off">
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Email" required autocomplete="off">
            </div>

            <button type="submit" id="submitBtn">Check In</button>
        </form>
    </div>

    <div id="successMessage" class="success-message">
        <div class="success-icon">✓</div>
        <h2>You're all set!</h2>
        <p style="color:#aaa;">Thanks for checking in.</p>
        <button onclick="location.reload()" style="margin-top:20px; background: #333;">New Entry</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBR-uD3eGhSkAFJSikQ6zSBGD_wspb-Aqo",
  authDomain: "aime-marketing-app.firebaseapp.com",
  projectId: "aime-marketing-app",
  storageBucket: "aime-marketing-app.firebasestorage.app",
  messagingSenderId: "600284637753",
  appId: "1:600284637753:web:daec455bb50dc126fc7be8",
  measurementId: "G-7B939E4Z7Z"
};

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // GET EVENT ID FROM URL OR DEFAULT TO 'demo_sandbox'
    const urlParams = new URLSearchParams(window.location.search);
    const eventId = urlParams.get('event') || 'demo_sandbox';

    document.getElementById('leadForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;

        btn.innerText = "SAVING...";
        btn.disabled = true;

        // DYNAMIC ROUTING: Saves to the URL parameter or the 'demo_sandbox' fallback
        db.collection("events").doc(eventId).collection("leads").add({
            name: name,
            email: email,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        })
        .then(() => {
            document.getElementById('formSection').style.display = 'none';
            document.getElementById('successMessage').style.display = 'block';
        })
        .catch((error) => {
            console.error("Error writing document: ", error);
            alert("Error: " + error.message);
            btn.innerText = "TRY AGAIN";
            btn.disabled = false;
        });
    });
</script>

</body>
</html>
